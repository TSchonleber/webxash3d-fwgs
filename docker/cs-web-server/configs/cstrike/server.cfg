hostname "My WebXash3D CS Server"
sv_lan 0
public 0
mp_friendlyfire 1
mp_timelimit 30
mp_autoteambalance 1

// spectator support
mp_allowspectators 1

// voice chat off — no in-game mic requirement / self-echo
sv_voiceenable 0

// rewards: HLDS logging for the result sidecar
log on
mp_logmessages 1
mp_logdetail 3
sv_log_onefile 1

// netcode tuning — smoother play / hit reg
sys_ticrate 100
sv_unlag 1
sv_maxunlag 0.5
sv_maxupdaterate 100
sv_minupdaterate 30
sv_maxrate 100000
sv_minrate 25000

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="/main.ts"></script>
    <title>ChainStrike</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@600;800&family=Chakra+Petch:wght@400;600&family=Spline+Sans+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root{ --lime:#c6ff3d; --lime2:#a6e500; --mag:#ff2e88; --ink:#07090b; --panel:#0d130f; --line:#1d2a1f; --txt:#e7f3e5; --mut:#819382; }
        *{ box-sizing:border-box; margin:0; padding:0 }
        body{ background:var(--ink); color:var(--txt); font-family:'Chakra Petch',system-ui,sans-serif; overflow:hidden;
              background-image:radial-gradient(1100px 600px at 50% -15%, rgba(166,229,0,.14), transparent 60%),
                               radial-gradient(800px 500px at 90% 110%, rgba(255,46,136,.08), transparent 60%); }
        .notDraggable{ user-select:none; -webkit-user-drag:none; pointer-events:none }

        /* full-screen game canvas */
        #canvas{ position:fixed; inset:0; width:100vw; height:100vh; z-index:1; display:block }

        /* loading logo — gentle pulsate + glow, NOT a shrinking box */
        @keyframes pulsate{ 0%,100%{ transform:translate(-50%,-50%) scale(1); filter:drop-shadow(0 0 26px rgba(166,229,0,.45)) }
                            50%{ transform:translate(-50%,-50%) scale(1.035); filter:drop-shadow(0 0 46px rgba(166,229,0,.7)) } }
        @keyframes pulsate-end{ to{ opacity:0; transform:translate(-50%,-55%) scale(1.06) } }
        #logo{ position:fixed; top:42%; left:50%; transform:translate(-50%,-50%);
               width:148px; height:148px; border-radius:30px; z-index:3;
               animation:pulsate 2.4s ease-in-out infinite; transition:opacity .5s ease }

        /* thin loading bar */
        progress{ position:fixed; top:0; left:0; width:100%; height:3px; border:0; z-index:4;
                  background:#10180f; transition:opacity .5s ease; appearance:none; -webkit-appearance:none }
        progress::-webkit-progress-bar{ background:#10180f }
        progress::-webkit-progress-value{ background:linear-gradient(90deg,var(--mag),var(--lime)) }
        progress::-moz-progress-bar{ background:var(--lime) }

        /* launch card */
        #form{ position:fixed; left:50%; top:64%; transform:translateX(-50%); z-index:5;
               width:min(420px,92vw); background:rgba(13,19,15,.82); backdrop-filter:blur(10px);
               border:1px solid var(--line); border-radius:18px; padding:22px;
               display:flex; flex-direction:column; gap:14px;
               box-shadow:0 24px 60px rgba(0,0,0,.55) }
        #form .field{ display:flex; flex-direction:column; gap:7px }
        #form label.lbl{ font-family:'Oxanium'; font-weight:800; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--mut) }
        #username{ background:#0a0f0a; border:1px solid var(--line); border-radius:11px; padding:13px 14px;
                   color:var(--txt); font-family:'Spline Sans Mono',monospace; font-size:15px; outline:none; transition:border-color .15s }
        #username:focus{ border-color:var(--lime) }
        .btns{ display:flex; gap:10px }
        #form button{ flex:1; font-family:'Oxanium'; font-weight:800; font-size:15px; letter-spacing:.5px;
                      border-radius:12px; padding:14px 0; cursor:pointer; border:1px solid transparent; transition:transform .07s, filter .15s }
        #form button[type=submit]{ color:#0a0f04; background:linear-gradient(180deg,var(--lime),var(--lime2));
                                   box-shadow:0 6px 0 #4f6a00 }
        #form button[type=submit]:active{ transform:translateY(3px); box-shadow:0 3px 0 #4f6a00 }
        #spectate{ background:transparent; border:1px solid var(--line); color:var(--txt) }
        #spectate:hover{ border-color:var(--lime); color:var(--lime) }
        .toggle{ display:flex; align-items:center; justify-content:space-between; color:var(--mut); font-size:13px }
        .toggle input{ width:16px; height:16px; accent-color:var(--lime) }
        .brandline{ text-align:center; font-family:'Oxanium'; font-weight:800; letter-spacing:3px; font-size:12px; color:var(--mut) }
        .brandline b{ color:var(--lime) }

        #warning{ position:fixed; left:0; right:0; bottom:14px; z-index:6; text-align:center; color:var(--mag);
                  font-size:13px; opacity:0; transition:opacity .5s ease }
        audio{ display:none }
        #connecting{ position:fixed; inset:0; z-index:8; display:none; align-items:center; justify-content:center; flex-direction:column;
              background:rgba(7,9,11,.93); backdrop-filter:blur(8px); color:var(--txt); font-family:'Chakra Petch',sans-serif }
        #connecting img{ width:120px; height:120px; border-radius:26px; filter:drop-shadow(0 0 30px rgba(166,229,0,.55)); animation:pulsate 2.2s ease-in-out infinite }
        #connecting .ct{ margin-top:22px; font-family:'Oxanium'; font-weight:800; letter-spacing:2px; color:var(--lime) }
        #connecting .cs{ margin-top:6px; color:var(--mut); font-size:14px; font-family:'Spline Sans Mono',monospace }

        /* landscape-first on mobile: cover portrait with a rotate prompt */
        #rotate{ position:fixed; inset:0; z-index:10; display:none; align-items:center; justify-content:center;
                 flex-direction:column; gap:16px; text-align:center; padding:32px; background:var(--ink); color:var(--txt); cursor:pointer }
        #rotate .ico{ font-size:48px; line-height:1; animation:rot 2.4s ease-in-out infinite }
        #rotate .rt{ font-family:'Oxanium'; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--lime); font-size:18px }
        #rotate .rs{ color:var(--mut); font-family:'Spline Sans Mono',monospace; font-size:13px }
        #rotate .rtap{ margin-top:10px; font-family:'Oxanium'; font-weight:800; font-size:13px; letter-spacing:1px;
                       color:var(--ink); background:var(--lime); border-radius:10px; padding:11px 22px }
        @keyframes rot{ 0%,100%{ transform:rotate(-12deg) } 50%{ transform:rotate(78deg) } }
        /* hard-hide when dismissed (inline style wins over the media query) */
        @media (orientation:portrait) and (pointer:coarse){ #rotate:not([hidden]){ display:flex } }

        /* lightweight DOM touch controls (no engine textures -> no OOM) */
        #mctl{ position:fixed; inset:0; z-index:7; pointer-events:none }
        #mctl > *{ pointer-events:auto; touch-action:none; -webkit-user-select:none; user-select:none }
        #mpad{ position:fixed; left:20px; bottom:20px; width:132px; height:132px; border-radius:50%;
               background:rgba(255,255,255,.05); border:1px solid rgba(198,255,61,.45) }
        #mnub{ position:absolute; left:50%; top:50%; width:56px; height:56px; margin:-28px 0 0 -28px; border-radius:50%;
               background:rgba(198,255,61,.5); border:1px solid rgba(198,255,61,.8) }
        #mfire{ position:fixed; right:24px; bottom:30px; width:100px; height:100px; border-radius:50%;
                display:flex; align-items:center; justify-content:center;
                background:rgba(255,46,136,.16); border:2px solid rgba(255,46,136,.75); color:var(--txt);
                font-family:'Oxanium',sans-serif; font-weight:800; font-size:15px; letter-spacing:1px }
        #mfire:active{ background:rgba(255,46,136,.34) }
    </style>
</head>
<body>
<img id="logo" alt="ChainStrike" class="notDraggable" src="logo.png"/>
<progress id="progress" value="0" max="1"></progress>
<canvas id="canvas"></canvas>

<form id="form">
    <div class="brandline">CHAIN<b>STRIKE</b></div>
    <div class="field">
        <label class="lbl" for="username">Player name</label>
        <input id="username" type="text" placeholder="enter a callsign" required/>
    </div>
    <label class="toggle">Touch controls <input type="checkbox" id="touchControls"></label>
    <div class="btns">
        <button type="submit">▸ PLAY</button>
        <button type="button" id="spectate">SPECTATE</button>
    </div>
</form>
<p id="warning" class="notDraggable">If it's not starting, enable your microphone and refresh.</p>
<div id="connecting">
    <img src="logo.png" alt=""/>
    <div class="ct">DROPPING INTO THE SERVER</div>
    <div class="cs">establishing secure match link…</div>
</div>
<div id="rotate">
    <div class="ico">⟳</div>
    <div class="rt">Rotate your device</div>
    <div class="rs">ChainStrike plays best in landscape</div>
    <div class="rtap">▸ Tap to play anyway</div>
</div>
<div id="mctl" hidden>
    <div id="mpad"><div id="mnub"></div></div>
    <div id="mfire">FIRE</div>
</div>
</body>
</html>
